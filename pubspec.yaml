name: grupo_exito
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  dartz: ^0.10.1
  dio: ^5.10.0
  equatable: ^2.1.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  freezed: ^3.2.3
  json_serializable: ^6.11.4
  riverpod_generator: ^4.0.4
  injectable_generator: ^3.0.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  image_path: "assets/android.png"
  android: true
  adaptive_icon_background: "#FEE23B"
  adaptive_icon_foreground: "assets/android.png"
  ios: true
  image_path_ios: "assets/iphone.png"
  remove_alpha_ios: true
  background_color_ios: "#FEE23B"
  web:
    generate: true
    image_path: "assets/android.png"
    background_color: "#FEE23B"
    theme_color: "#FEE23B"

flutter_native_splash:
  color: "#FEE23B"
  image: "assets/logo.png"
  web_image_mode: center
  android_12:
    color: "#FEE23B"
    image: "assets/logo.png"
    icon_background_color: "#FEE23B"
